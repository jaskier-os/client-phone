[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short -x --html=reports/report.html --self-contained-html
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    requires_orchestrator: marks tests that need orchestrator running
    requires_bt: marks tests that need BT connection to glasses
